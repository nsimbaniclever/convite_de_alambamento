<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Casamento - Manuel & Teresa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope">
                <div class="envelope-body"></div>
                <div class="envelope-border"></div>
                <div class="envelope-left"></div>
                <div class="envelope-right"></div>
                <div class="envelope-bottom"></div>

                <!-- Aba do envelope -->
                <div class="envelope-flap">
                    <div class="envelope-flap-inner"></div>
                </div>

                <button class="btn-abrir-envelope" id="btnAbrir">ABRIR</button>
            </div>
        </div>

        <!-- Carta (mensagem) -->
        <div class="letter" id="letter">
            <div class="letter-ornament-top">✦ ✦ </div>
            <h2>Bem-vindo!</h2>
            <p> 
                É com grande alegria que recebemos você.<br>
                Que este seja o início de uma jornada<br>
                maravilhosa, repleta de momentos<br>
                especiais e inesquecíveis.
            </p>
            <div class="signature">Com carinho ♥</div>
            <div class="letter-ornament-bottom">✦ ✦ ✦</div>

            <!-- Botão Avançar -->
            <a href="pagina/index01.html" class="btn-avancar">Avançar</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
